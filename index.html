<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1a0f">
<title>DAEJUMO CLUB</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d1a0f;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#e8f5e9;}
:root{
  --gr:#2d6a2d;--gl:#4a9e4a;--gd:#c9a84c;--gdl:#f0d080;
  --bg:#0d1a0f;--bg2:#142018;--sf:#1e301f;--sf2:#243827;
  --tx:#e8f5e9;--tx2:#a5c8a7;--tx3:#6a8f6b;--bd:#2d4a30;--ac:#4caf50;
}
#app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}

/* 헤더 */
.hdr{background:linear-gradient(135deg,#0a1a0b,#142018);padding:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;}
.hlogo{display:flex;align-items:center;gap:10px;}
.hico{width:38px;height:38px;background:linear-gradient(135deg,var(--gd),var(--gdl));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#0d1a0f;font-size:20px;}
.htit{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gdl);}
.hsub{font-size:11px;color:var(--tx3);}
.ibtn{min-width:38px;height:38px;padding:0 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--tx2);cursor:pointer;font-size:18px;font-family:inherit;}

/* 내비 */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#0a1a0b;border-top:1px solid var(--bd);display:flex;z-index:5;}
.ni{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--tx3);font-size:11px;user-select:none;-webkit-tap-highlight-color:transparent;}
.ni.on{color:var(--gdl);}
.ni-ico{font-size:22px;}
.ndot{width:4px;height:4px;background:var(--gd);border-radius:50%;}

/* 페이지 */
.pg{padding:14px 14px 90px;}
.page{display:none;}.page.on{display:block;}

/* 카드 */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;}
.cardg{border-color:#5a4a1a;background:linear-gradient(135deg,#1e1a09,#2a2210);}
.sec{font-size:12px;font-weight:700;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}

/* 히어로 */
.hero{background:linear-gradient(135deg,#0d2010,#1a3520);border:1px solid #2d5030;border-radius:18px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::before{content:'⛳';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.1;}

/* 통계 카드 */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.sbox{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:14px 10px;text-align:center;}
.sval{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gdl);line-height:1;}
.slbl{font-size:11px;color:var(--tx3);margin-top:4px;}

/* 라운드 행 */
.rrow{background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:rgba(255,255,255,.08);}
.rrow:active{background:var(--sf2);}

/* 회원 카드 */
.mcard{background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.ava{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--gr),var(--gl));display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:white;flex-shrink:0;}

/* 리더 배너 */
.ldr{background:linear-gradient(135deg,#2a2008,#3a3010);border:1px solid #6a5820;border-radius:13px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}

/* 배지 */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);}
.bdg{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.done{background:#1a3520;color:var(--ac);border:1px solid #2d5030;}
.pend{background:#2a1a08;color:var(--gd);border:1px solid #4a3010;}

/* 이미지 버튼 행 */
.imgrow{display:flex;gap:8px;margin-bottom:14px;}
.imgbtn{flex:1;padding:10px 6px;border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;}
.imgbtn-g{background:linear-gradient(135deg,#1a3020,#243827);border:1px solid #2d5030;color:#a5c8a7;}
.imgbtn-r{background:linear-gradient(135deg,#2a2008,#3a3010);border:1px solid #6a5820;color:var(--gdl);}

/* 테이블 */
.rtbl{width:100%;border-collapse:collapse;}
.rtbl th{font-size:11px;color:var(--tx3);font-weight:600;padding:8px;border-bottom:1px solid var(--bd);text-align:left;}
.rtbl td{padding:9px 8px;border-bottom:1px solid #1a2e1c;font-size:13px;}
.rtbl tr:last-child td{border:none;}
.rtbl .r1 td{background:linear-gradient(90deg,#2a2008,transparent);}
.rtbl .r2 td{background:linear-gradient(90deg,#1e2a20,transparent);}
.rtbl .r3 td{background:linear-gradient(90deg,#1a2018,transparent);}
.ng{color:#4caf50;font-weight:700;}
.nb{color:#ef5350;font-weight:700;}

/* 조편성 */
.gcrd{background:var(--sf2);border:1px solid var(--bd);border-radius:13px;padding:13px;margin-bottom:10px;}
.gmem{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #1a2e1c;}
.gmem:last-child{border:none;}

/* 모달 */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:20;align-items:flex-end;justify-content:center;}
.ovl.on{display:flex;}
.mod{background:var(--bg2);border-top:1px solid var(--bd);border-radius:22px 22px 0 0;width:100%;max-width:420px;max-height:92vh;display:flex;flex-direction:column;}
.mhdr{padding:18px 18px 0;flex-shrink:0;}
.mtit{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.mbdy{padding:0 18px 32px;overflow-y:auto;flex:1;}
.steps{display:flex;gap:7px;margin-bottom:16px;}
.sdot{flex:1;height:4px;border-radius:2px;background:var(--bd);}
.sdot.on{background:var(--ac);}

/* 폼 */
.lbl{font-size:12px;font-weight:700;color:var(--tx3);letter-spacing:1px;margin-bottom:5px;}
.inp{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:11px;padding:12px 14px;color:#e8f5e9;font-size:15px;font-family:inherit;margin-bottom:14px;outline:none;display:block;}
.inp:focus{border-color:var(--gl);}
.inp::placeholder{color:var(--tx3);}
.inprow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{width:100%;padding:14px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;border:none;display:block;text-align:center;margin-top:0;}
.btn-g{background:linear-gradient(135deg,var(--gr),var(--gl));color:white;}
.btn-s{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);margin-top:10px;}
.btn-a{background:linear-gradient(135deg,#8a6a1a,var(--gd));color:#0d1a0f;}
.btn-c{background:linear-gradient(135deg,#1a4a2a,#2d6a2d);border:1px solid #3d8a3d;color:#a0e0a0;margin-top:10px;}
.btn-del{background:linear-gradient(135deg,#6a2020,#a03030);color:white;}
.scrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a2e1c;}
.scrow:last-child{border:none;}
.sinp{width:70px;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:8px;color:#e8f5e9;font-size:15px;font-family:inherit;text-align:center;outline:none;}
.sinp:focus{border-color:var(--ac);}

/* 확인 다이얼로그 */
.covl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:30;align-items:center;justify-content:center;padding:20px;}
.covl.on{display:flex;}
.cbox{background:var(--bg2);border:1px solid var(--bd);border-radius:18px;padding:24px;width:100%;max-width:320px;text-align:center;}
.cbtns{display:flex;gap:10px;margin-top:20px;}
.cbtns button{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;}

/* 토스트 */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:rgba(26,58,26,.97);color:#e8f5e9;padding:13px 22px;border-radius:13px;font-size:14px;font-weight:600;z-index:99;border:1px solid #3a6a3a;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;}

/* 조편성 캡처용 숨김 영역 */
#grp-capture{position:fixed;left:-9999px;top:0;width:600px;background:#0f1f10;font-family:'Noto Sans KR',sans-serif;display:none;}

select{-webkit-appearance:none;appearance:none;}
</style>
</head>
<body>
<div id="app">
  <!-- 헤더 -->
  <div class="hdr">
    <div class="hlogo">
      <div class="hico">⛳</div>
      <div><div class="htit">DAEJUMO CLUB</div><div class="hsub">월례 라운딩 관리</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="btnAdminToggle" style="padding:0 10px;height:38px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--tx3);font-size:12px;font-family:inherit;cursor:pointer;">🔒 조회</button>
      <button class="ibtn" id="btnNewRound" style="display:none;">＋</button>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="pg">
    <div class="page on" id="page-home"></div>
    <div class="page"    id="page-rounds"></div>
    <div class="page"    id="page-members"></div>
    <div class="page"    id="page-ranking"></div>
  </div>

  <!-- 하단 내비 -->
  <div class="nav">
    <div class="ni on" data-tab="home">  <div class="ni-ico">🏠</div><span>홈</span>    <div class="ndot"></div></div>
    <div class="ni"    data-tab="rounds"><div class="ni-ico">📅</div><span>라운드</span></div>
    <div class="ni"    data-tab="members"><div class="ni-ico">👥</div><span>회원</span></div>
    <div class="ni"    data-tab="ranking"><div class="ni-ico">🏆</div><span>순위</span></div>
  </div>
</div>

<!-- ══ 새 라운드 모달 ══ -->
<div class="ovl" id="ovl-newRound">
  <div class="mod">
    <div class="mhdr">
      <div class="mtit">새 라운드 등록 <button class="ibtn" id="btnCloseNewRound">✕</button></div>
      <div class="steps"><div class="sdot on" id="sd1"></div><div class="sdot" id="sd2"></div></div>
    </div>
    <div class="mbdy" id="newRoundBody"></div>
  </div>
</div>

<!-- ══ 라운드 상세 모달 ══ -->
<div class="ovl" id="ovl-detail">
  <div class="mod">
    <div class="mhdr">
      <div class="mtit">
        라운드 상세
        <div style="display:flex;gap:6px;align-items:center;">
          <button id="btnOpenScore" style="padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#8a6a1a,var(--gd));color:#0d1a0f;border:none;cursor:pointer;font-family:inherit;display:none;">✏️ 결과입력</button>
          <button class="ibtn" id="btnCloseDetail">✕</button>
        </div>
      </div>
    </div>
    <div class="mbdy" id="detailBody"></div>
  </div>
</div>

<!-- ══ 결과 입력 모달 ══ -->
<div class="ovl" id="ovl-score">
  <div class="mod">
    <div class="mhdr">
      <div class="mtit">
        <div><div style="font-size:15px;">결과 입력</div><div id="scoreSubtitle" style="font-size:12px;color:var(--tx3);font-weight:400;margin-top:2px;"></div></div>
        <button class="ibtn" id="btnCloseScore">✕</button>
      </div>
    </div>
    <div class="mbdy" id="scoreBody"></div>
  </div>
</div>

<!-- ══ 회원 추가/수정 모달 ══ -->
<div class="ovl" id="ovl-member">
  <div class="mod">
    <div class="mhdr">
      <div class="mtit"><span id="memberTitle">회원 추가</span><button class="ibtn" id="btnCloseMember">✕</button></div>
    </div>
    <div class="mbdy">
      <div class="lbl">이름 *</div>
      <input class="inp" id="nm-name" placeholder="홍길동">
      <div class="inprow">
        <div><div class="lbl">출생연도 (뒤 2자리)</div><input class="inp" id="nm-by" type="number" placeholder="74"></div>
        <div><div class="lbl">핸디캡 *</div><input class="inp" id="nm-hcp" type="number" step="0.1" placeholder="12.5"></div>
      </div>
      <div class="lbl">연락처</div>
      <input class="inp" id="nm-ph" placeholder="010-0000-0000">
      <button class="btn btn-g" id="btnSaveMember">✓ 추가 완료</button>
      <button class="btn btn-s" id="btnCancelMember">취소</button>
    </div>
  </div>
</div>

<!-- ══ 라운드 삭제 확인 ══ -->
<div class="covl" id="covl-delRound">
  <div class="cbox">
    <div style="font-size:36px;margin-bottom:12px;">🗑</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;">라운드를 삭제할까요?</div>
    <div id="delRoundName" style="font-size:14px;color:var(--tx2);margin-bottom:6px;"></div>
    <div style="font-size:12px;color:var(--tx3);line-height:1.6;">삭제하면 해당 라운드의 모든 데이터가<br>제거됩니다.</div>
    <div class="cbtns">
      <button id="btnCancelDelRound" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);">취소</button>
      <button id="btnConfirmDelRound" style="background:linear-gradient(135deg,#8a2020,#c03030);color:white;">삭제</button>
    </div>
  </div>
</div>

<!-- ══ 회원 삭제 확인 ══ -->
<div class="covl" id="covl-delMember">
  <div class="cbox">
    <div style="font-size:36px;margin-bottom:12px;">🗑</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;">회원을 삭제할까요?</div>
    <div id="delMemberName" style="font-size:14px;color:var(--tx2);margin-bottom:16px;"></div>
    <div style="font-size:12px;color:var(--tx3);line-height:1.6;margin-bottom:4px;">삭제하면 해당 회원의 라운드 기록도<br>함께 제거됩니다.</div>
    <div class="cbtns">
      <button id="btnCancelDelMember" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);">취소</button>
      <button id="btnConfirmDelMember" style="background:linear-gradient(135deg,#8a2020,#c03030);color:white;">삭제</button>
    </div>
  </div>
</div>

<!-- ══ 총무 로그인 모달 ══ -->
<div class="covl" id="covl-admin">
  <div class="cbox">
    <div style="font-size:36px;margin-bottom:12px;">🔐</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px;">총무 로그인</div>
    <div style="font-size:13px;color:var(--tx3);margin-bottom:16px;">비밀번호를 입력하세요</div>
    <input id="adminPwInput" type="password" class="inp" placeholder="비밀번호"
      style="margin-bottom:16px;text-align:center;font-size:18px;letter-spacing:4px;">
    <div class="cbtns">
      <button id="btnAdminCancel" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);">취소</button>
      <button id="btnAdminLogin" style="background:linear-gradient(135deg,var(--gr),var(--gl));color:white;">로그인</button>
    </div>
    <div id="adminLoginErr" style="color:#ef5350;font-size:12px;margin-top:10px;display:none;">비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- ══ 토스트 ══ -->
<div class="toast" id="toast"></div>

<!-- ══ 조편성 캡처용 숨김 div ══ -->
<div id="grp-capture"></div>

<script>
'use strict';

/* ══════════════════════════════════════════
   Firebase 설정
══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyD31WUoAX2t6P0Ra2hYCTYf7cHoE9sABCE",
  authDomain: "daejumo-club.firebaseapp.com",
  databaseURL: "https://daejumo-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "daejumo-club",
  storageBucket: "daejumo-club.firebasestorage.app",
  messagingSenderId: "1001314765270",
  appId: "1:1001314765270:web:a39ae0c3cee8c2a8b9a12d"
};
firebase.initializeApp(firebaseConfig);
const DB = firebase.database();

/* ── Firebase 읽기/쓰기 ── */
function fbGet(path){
  return DB.ref(path).once('value').then(snap=>snap.val());
}
function fbSet(path,data){
  return DB.ref(path).set(data);
}
function fbRemove(path){
  return DB.ref(path).remove();
}
// 실시간 구독 (데이터 변경 시 자동 반영)
function fbOn(path,cb){
  DB.ref(path).on('value', snap=>cb(snap.val()));
}

/* ══════════════════════════════════════════
   앱 상태
══════════════════════════════════════════ */
// 총무 비밀번호 (변경 원하면 이 값을 수정하세요)
const ADMIN_PW = '1234';

const S={
  tab:'home',
  MB:[], RD:[],
  nMid:100, nRid:100,
  nr:{date:'',course:'',groups:[]}, stp:1,
  se:{}, seRound:null,
  editM:null,
  delRoundId:null, delMemberId:null,
  selRound:null,
  isAdmin:false,   // 총무 모드 여부
};

/* ══════════════════════════════════════════
   유틸
══════════════════════════════════════════ */
// 배점: 1위=100P, 2위=90P, 3위=80P, 나머지=50P
function getPoint(rank){ return rank===1?100:rank===2?90:rank===3?80:50; }

// Score = gross - (hcp + 72)
// 순위: Score 낮은 순, 동점이면 hcp 낮은 순
function getRanks(round){
  if(!round.scores||!round.scores.length) return [];
  return round.scores.map(s=>{
    const m=S.MB.find(x=>x.id===s.mid);
    if(!m) return null;
    // 결과 저장 시점의 HCP 사용 (없으면 현재 회원 HCP로 fallback)
    const hcp = s.hcp !== undefined ? parseFloat(s.hcp) : parseFloat(m.hcp);
    return {...m, gross:s.gross, hcp:hcp, net:parseFloat((s.gross-(hcp+72)).toFixed(1))};
  }).filter(Boolean)
    .sort((a,b)=> a.net!==b.net ? a.net-b.net : a.hcp-b.hcp)
    .map((r,i)=>({...r,rank:i+1,point:getPoint(i+1)}));
}

function getStats(){
  return S.MB.map(m=>{
    const parts=S.RD.filter(r=>r.scores&&r.scores.find(s=>s.mid===m.id));
    const nets=parts.map(r=>{const s=r.scores.find(s=>s.mid===m.id);const hcp=s.hcp!==undefined?parseFloat(s.hcp):parseFloat(m.hcp);return parseFloat((s.gross-(hcp+72)).toFixed(1));});
    const wins=parts.filter(r=>getRanks(r)[0]?.id===m.id).length;
    const pts=parts.reduce((sum,r)=>{
      const rk=getRanks(r), me=rk.find(x=>x.id===m.id);
      return sum+(me?me.point:0);
    },0);
    const avg=nets.length?(nets.reduce((a,b)=>a+b,0)/nets.length).toFixed(1):'-';
    return {...m,pc:parts.length,avg,wins,pts};
  }).sort((a,b)=>b.pts-a.pts);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function medal(r){
  if(r===1) return '<span style="font-size:20px;">🥇</span>';
  if(r===2) return '<span style="font-size:20px;">🥈</span>';
  if(r===3) return '<span style="font-size:20px;">🥉</span>';
  return `<span style="color:#7a8b6f;font-weight:700;font-size:14px;">${r}</span>`;
}

   토스트
══════════════════════════════════════════ */
function showToast(msg, type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='err'?'rgba(80,20,20,.97)':'rgba(26,58,26,.97)';
  t.style.borderColor=type==='err'?'#6a3030':'#3a6a3a';
  t.classList.add('on');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('on'),3000);
}

          <div style="width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,var(--gr),var(--gl));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;">${esc(m.name[0])}</div>
          ${esc(m.name)}<span style="font-size:11px;color:var(--gd);">▼</span>
        </div>
      </div>`;
    });

  h+=`</div>`;
  S.nr.groups.forEach((g,gi)=>{
    h+=`<div style="background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:10px;">

      h+=`<div style="font-size:13px;color:var(--tx3);text-align:center;padding:8px 0;">배정된 회원 없음</div>`;
    } else {
      g.mids.forEach(mid=>{
        const m=S.MB.find(x=>x.id===mid); if(!m) return;
        h+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1a2e1c;">
          <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--gr),var(--gl));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:white;">${esc(m.name[0])}</div>

  });

  <button class="btn btn-s" onclick="S.stp=1;renderNewRoundStep();">← 이전</button>`;

function addGroup(){S.nr.groups.push({name:`${S.nr.groups.length+1}조`,mids:[]});renderGroupStep();}
function renameGroup(i,n){S.nr.groups[i].name=n;}
function deleteGroup(i){S.nr.groups.splice(i,1);renderGroupStep();}
function assignMember(mid,gi){
  S.nr.groups.forEach(g=>{g.mids=g.mids.filter(id=>id!==mid);});
  if(gi!==''&&gi>=0) S.nr.groups[parseInt(gi)].mids.push(mid);
  renderGroupStep();
}
function unassignMember(mid){S.nr.groups.forEach(g=>{g.mids=g.mids.filter(id=>id!==mid);});renderGroupStep();}

function confirmGroups(){
  if(!S.nr.groups.length) return;
  const round={
    id:S.nRid,
    date:S.nr.date,
    course:S.nr.course,
    groups:JSON.parse(JSON.stringify(S.nr.groups)),
    scores:[]
  };
  // Firebase 저장
  S.nRid++;
  fbSet('rounds/'+round.id, round).catch(console.error);
  fbSet('meta/nRid', S.nRid).catch(console.error);
  // 모달 닫기
  document.getElementById('ovl-newRound').classList.remove('on');
  S.nr={date:'',course:'',groups:[]};S.stp=1;
  // 화면 전환
  setTab('rounds');
  // 이미지 저장 (html2canvas)
  saveGroupImage(round);
}

══════════════════════════════════════════ */
function openScoreEntry(){
  const round=S.selRound; if(!round) return;
  S.seRound=round; S.se={};
  round.scores?.forEach(s=>{S.se[s.mid]=s.gross;});
  document.getElementById('scoreSubtitle').textContent=round.course+' · '+round.date;
  let h=`<div style="font-size:13px;color:var(--tx3);margin-bottom:14px;padding:8px 12px;background:var(--sf2);border-radius:9px;border:1px solid var(--bd);">그로스(총 타수) 입력 → Score 자동 계산</div>`;
  round.groups.forEach(g=>{
    h+=`<div class="card" style="margin-bottom:12px;">
      <div style="font-size:13px;color:var(--gd);font-weight:700;margin-bottom:10px;">${esc(g.name)}</div>`;
    g.mids.forEach(mid=>{
      const m=S.MB.find(x=>x.id===mid); if(!m) return;
      const v=S.se[mid]||'';
      h+=`<div class="scrow">
        <div><div style="font-size:15px;font-weight:600;">${esc(m.name)}</div><div style="font-size:12px;color:var(--tx3);">HCP ${parseFloat(m.hcp||0).toFixed(1)}</div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input class="sinp" type="number" placeholder="타수" value="${v}" id="se-${mid}"
            oninput="updateNet(${mid},${m.hcp},this.value)">
          <div id="net-${mid}" style="font-size:12px;color:var(--gd);min-width:54px;text-align:right;">${v?'Score '+parseFloat((parseFloat(v)-(parseFloat(m.hcp)+72)).toFixed(1)):''}</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`<button class="btn btn-g" onclick="saveScores()">✓ 결과 확인</button>
      <button class="btn btn-s" onclick="backToDetail()">← 돌아가기</button>`;
  document.getElementById('scoreBody').innerHTML=h;
  document.getElementById('ovl-detail').classList.remove('on');
  document.getElementById('ovl-score').classList.add('on');
}
function updateNet(mid,hcp,val){
  S.se[mid]=val;
  const el=document.getElementById('net-'+mid);
  if(el) el.textContent=val?'Score '+parseFloat((parseFloat(val)-(parseFloat(hcp)+72)).toFixed(1)):'';
}
function backToDetail(){
  document.getElementById('ovl-score').classList.remove('on');
  openDetail(S.selRound.id);
}
function saveScores(){
  const round=S.seRound; if(!round) return;
  const scores=[];
  round.groups.forEach(g=>{
    g.mids.forEach(mid=>{
      const el=document.getElementById('se-'+mid);
      if(el&&el.value){
        const m=S.MB.find(x=>x.id===parseInt(mid));
        scores.push({
          mid:parseInt(mid),
          gross:parseInt(el.value),
          hcp:m?parseFloat(m.hcp):0   // ← 결과 저장 시점의 HCP 스냅샷
        });
      }
    });
  });
  const idx=S.RD.findIndex(r=>r.id===round.id);
  if(idx>=0){S.RD[idx]={...S.RD[idx],scores};S.selRound=S.RD[idx];}
  fbSet('rounds/'+round.id, S.RD[idx]).catch(console.error);
  document.getElementById('ovl-score').classList.remove('on');
  openDetail(round.id);
  showToast('✅ 결과가 저장되었습니다!');
}

    ${S.isAdmin?`<button class="ibtn" onclick="openAddMember()">＋</button>`:''}

    h+=`<div style="color:var(--tx3);font-size:14px;text-align:center;padding:40px 0;">등록된 회원이 없습니다</div>`;
  } else {
    // 가나다순 정렬
    const sorted=[...S.MB].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    sorted.forEach(m=>{
      const st=ST.find(s=>s.id===m.id);
      h+=`<div class="mcard">
        <div class="ava">${esc(m.name[0])}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:7px;">
            <div style="font-size:16px;font-weight:700;">${esc(m.name)}</div>

              style="background:none;border:none;cursor:pointer;padding:2px;color:var(--tx3);font-size:15px;line-height:1;">✏️</button>
            <button onclick="openDelMember(${m.id})" title="삭제"
              style="background:none;border:none;cursor:pointer;padding:2px;color:#d06060;font-size:15px;line-height:1;">🗑</button>`:''}
          </div>
          <div style="font-size:12px;color:var(--tx3);margin-top:3px;">
            ${m.by?`${m.by}년생`:''}${m.by&&m.ph?' &nbsp;·&nbsp; ':''}${m.ph?esc(m.ph):''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
            <div style="background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:2px 9px;font-size:12px;color:var(--gd);font-weight:700;">HCP ${parseFloat(m.hcp||0).toFixed(1)}</div>
            <div style="font-size:12px;color:var(--tx3);">${st?.pc??0}회 참가</div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:19px;font-weight:900;color:var(--gdl);line-height:1.1;">${st?.avg!=='-'?st?.avg:'-'}</div>
          <div style="font-size:10px;color:var(--tx3);margin-bottom:6px;">평균 Score</div>
          <div style="font-size:17px;font-weight:800;color:var(--ac);line-height:1.1;">${st?.pts??0}P</div>
          <div style="font-size:10px;color:var(--tx3);">누적점수</div>
        </div>
      </div>`;
    });
  }
  if(S.isAdmin) h+=`<button class="btn btn-g" style="margin-top:4px;" onclick="openAddMember()">＋ 회원 추가</button>`;
  document.getElementById('page-members').innerHTML=h;
}
function openAddMember(){
  S.editM=null;
  document.getElementById('memberTitle').textContent='회원 추가';
  document.getElementById('btnSaveMember').textContent='✓ 추가 완료';
  ['nm-name','nm-by','nm-hcp','nm-ph'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ovl-member').classList.add('on');
}
function openEditMember(id){
  const m=S.MB.find(x=>x.id===id); if(!m) return;
  S.editM=m;
  document.getElementById('memberTitle').textContent='회원 수정';
  document.getElementById('btnSaveMember').textContent='✓ 수정 완료';
  document.getElementById('nm-name').value=m.name;
  document.getElementById('nm-by').value=m.by||'';
  document.getElementById('nm-hcp').value=m.hcp;
  document.getElementById('nm-ph').value=m.ph||'';
  document.getElementById('ovl-member').classList.add('on');
}
function saveMember(){
  if(!S.isAdmin){showToast('총무 로그인이 필요합니다','err');return;}
  const name=document.getElementById('nm-name').value.trim();
  const hcp=document.getElementById('nm-hcp').value.trim();
  if(!name||!hcp){showToast('이름과 핸디캡은 필수입니다','err');return;}
  const by=document.getElementById('nm-by').value.trim();
  const ph=document.getElementById('nm-ph').value.trim();

  let member;
  if(S.editM){
    // 수정
    member={id:S.editM.id, name, by:by?parseInt(by):null, hcp:parseFloat(hcp), ph};
  } else {
    // 신규 추가
    const newId=S.nMid;
    member={id:newId, name, by:by?parseInt(by):null, hcp:parseFloat(hcp), ph};
    S.nMid++;
    fbSet('meta/nMid', S.nMid).catch(console.error);
  }
  fbSet('members/'+member.id, member)
    .then(()=>showToast(S.editM?'회원 정보가 수정되었습니다':'✅ 회원이 추가되었습니다'))
    .catch(e=>{console.error(e);showToast('저장 실패. 인터넷 연결을 확인하세요','err');});
  document.getElementById('ovl-member').classList.remove('on');
}
function openDelMember(id){
  const m=S.MB.find(x=>x.id===id); if(!m) return;
  S.delMemberId=id;
  document.getElementById('delMemberName').innerHTML=`<strong style="color:var(--gdl);">${esc(m.name)}</strong>${m.by?' ('+m.by+'년생)':''}`;
  document.getElementById('covl-delMember').classList.add('on');
}
function confirmDelMember(){
  const id=S.delMemberId;
  S.MB=S.MB.filter(m=>m.id!==id);
  S.RD=S.RD.map(r=>({
    ...r,
    scores:r.scores.filter(s=>s.mid!==id),
    groups:r.groups.map(g=>({...g,mids:g.mids.filter(mid=>mid!==id)}))
  }));
  // Firebase에서 삭제
  fbRemove('members/'+id).catch(console.error);
  // 라운드 데이터에서 해당 회원 제거 후 업데이트
  S.RD.forEach(r=>{
    const updated={...r,
      scores:r.scores.filter(s=>s.mid!==id),
      groups:r.groups.map(g=>({...g,mids:g.mids.filter(mid=>mid!==id)}))
    };
    fbSet('rounds/'+r.id, updated).catch(console.error);
  });
  document.getElementById('covl-delMember').classList.remove('on');
  showToast('회원이 삭제되었습니다');
}

function setAdminMode(on){
  S.isAdmin=on;
  const btn=document.getElementById('btnAdminToggle');
  const newRoundBtn=document.getElementById('btnNewRound');
  if(on){
    btn.textContent='🔓 총무';
    btn.style.background='linear-gradient(135deg,var(--gr),var(--gl))';
    btn.style.color='white';
    btn.style.borderColor='var(--gl)';
    newRoundBtn.style.display='flex';
    showToast('✅ 총무 모드로 전환됐습니다');
  } else {
    btn.textContent='🔒 조회';
    btn.style.background='var(--sf2)';
    btn.style.color='var(--tx3)';
    btn.style.borderColor='var(--bd)';
    newRoundBtn.style.display='none';
    showToast('조회 모드로 전환됐습니다');
  }
  // 현재 탭 다시 렌더 (수정/삭제 버튼 표시 여부 반영)
  const renders={home:renderHome,rounds:renderRounds,members:renderMembers,ranking:renderRanking};
  if(renders[S.tab]) renders[S.tab]();
}

/* ══════════════════════════════════════════
   Firebase 실시간 데이터 로드
══════════════════════════════════════════ */
function initFirebase(){
  // 회원 실시간 구독
  fbOn('members', data=>{
    if(data){
      S.MB=Object.values(data);
    } else {
      S.MB=[];
    }
    const renders={home:renderHome,rounds:renderRounds,members:renderMembers,ranking:renderRanking};
    if(renders[S.tab]) renders[S.tab]();
  });

  // 라운드 실시간 구독
  fbOn('rounds', data=>{
    if(data){
      S.RD=Object.values(data).sort((a,b)=>b.id-a.id);
    } else {
      S.RD=[];
    }
    const renders={home:renderHome,rounds:renderRounds,members:renderMembers,ranking:renderRanking};
    if(renders[S.tab]) renders[S.tab]();
  });

  // meta (nMid, nRid) 로드
  fbGet('meta').then(data=>{
    if(data){
      if(data.nMid) S.nMid=data.nMid;
      if(data.nRid) S.nRid=data.nRid;
    } else {
      // 첫 실행: 샘플 회원 등록
      const sample={id:1,name:'홍길동',by:74,hcp:12,ph:'010-1234-5678'};
      fbSet('members/1', sample);
      fbSet('meta', {nMid:2, nRid:100});
    }
  });

  renderHome();
}

initFirebase();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
